{% extends 'base.html' %}
{% block title %}Admin Login – EventHub{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-header">
            <div class="auth-icon" style="background: linear-gradient(135deg, #7c3aed, #4f46e5);">🛡️</div>
            <h2>Admin Portal</h2>
            <p>Sign in to manage events and analytics</p>
        </div>

        <form method="POST" action="{{ url_for('admin_login') }}" data-validate id="adminLoginForm">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" name="email" id="email" class="form-control"
                       placeholder="Enter admin email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control"
                       placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="adminLoginBtn">
                Sign In as Admin
            </button>
        </form>

        <div class="form-links">
            <p>New admin? <a href="{{ url_for('admin_signup') }}">Create Admin Account</a></p>
        </div>

        <div class="form-divider">or</div>

        <div class="text-center">
            <a href="{{ url_for('login') }}" class="btn btn-secondary btn-block">
                🎓 Student Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
