{% extends 'base.html' %}
{% block title %}Login – EventHub{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-header">
            <div class="auth-icon">🔑</div>
            <h2>Welcome Back</h2>
            <p>Sign in to your student account</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" data-validate id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" class="form-control"
                       placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control"
                       placeholder="Enter your password" required>
            </div>

            <div style="text-align: right; margin-bottom: 20px;">
                <a href="{{ url_for('forgot_password') }}" style="color: var(--primary); font-size: 0.88rem; font-weight: 500;">
                    Forgot Password?
                </a>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
                Sign In
            </button>
        </form>

        <div class="form-links">
            <p>Don't have an account? <a href="{{ url_for('signup') }}">Create Account</a></p>
        </div>

        <div class="form-divider">or</div>

        <div class="text-center">
            <a href="{{ url_for('admin_login') }}" class="btn btn-secondary btn-block">
                🛡️ Admin Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
