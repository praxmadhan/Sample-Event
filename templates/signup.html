{% extends 'base.html' %}
{% block title %}Sign Up – EventHub{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-header">
            <div class="auth-icon">🎓</div>
            <h2>Create Account</h2>
            <p>Join EventHub and explore campus events</p>
        </div>

        <form method="POST" action="{{ url_for('signup') }}" data-validate id="signupForm">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" name="name" id="name" class="form-control"
                       placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" name="email" id="email" class="form-control"
                       placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="college_name">College Name</label>
                <input type="text" name="college_name" id="college_name" class="form-control"
                       placeholder="e.g., Bharath Niketan Engineering College">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="department">Department</label>
                    <select name="department" id="department" class="form-control">
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Electronics & Communication">Electronics & Communication</option>
                        <option value="Electrical Engineering">Electrical Engineering</option>
                        <option value="Mechanical Engineering">Mechanical Engineering</option>
                        <option value="Civil Engineering">Civil Engineering</option>
                        <option value="Artificial Intelligence">Artificial Intelligence</option>
                        <option value="Data Science">Data Science</option>
                        <option value="Biotechnology">Biotechnology</option>
                        <option value="MBA">MBA</option>
                        <option value="MCA">MCA</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="batch">Batch (Year)</label>
                    <select name="batch" id="batch" class="form-control">
                        <option value="">Select Batch</option>
                        <option value="2020-2024">2020-2024</option>
                        <option value="2021-2025">2021-2025</option>
                        <option value="2022-2026">2022-2026</option>
                        <option value="2023-2027">2023-2027</option>
                        <option value="2024-2028">2024-2028</option>
                        <option value="2025-2029">2025-2029</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" name="password" id="password" class="form-control"
                       placeholder="At least 6 characters" required minlength="6">
                <p class="form-hint">Must be at least 6 characters</p>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password *</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control"
                       placeholder="Re-enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="signupBtn">
                Create Account
            </button>
        </form>

        <div class="form-links">
            <p>Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}
