{% extends 'base.html' %}
{% block title %}Reset Password – EventHub{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-header">
            <div class="auth-icon" style="background: linear-gradient(135deg, #10b981, #06b6d4);">🔑</div>
            <h2>Reset Password</h2>
            <p>Enter your new password below</p>
        </div>

        <form method="POST" action="{{ url_for('reset_password', token=token) }}" data-validate id="resetPasswordForm">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" name="password" id="password" class="form-control"
                       placeholder="At least 6 characters" required minlength="6">
                <p class="form-hint">Must be at least 6 characters</p>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control"
                       placeholder="Re-enter your new password" required>
            </div>

            <button type="submit" class="btn btn-success btn-block btn-lg" id="resetPasswordBtn">
                ✅ Reset Password
            </button>
        </form>

        <div class="form-links mt-3">
            <p>Back to <a href="{{ url_for('login') }}">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}
