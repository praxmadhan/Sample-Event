{% extends 'base.html' %}
{% block title %}Admin Sign Up – EventHub{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-header">
            <div class="auth-icon" style="background: linear-gradient(135deg, #7c3aed, #4f46e5);">🛡️</div>
            <h2>Admin Registration</h2>
            <p>Create an admin account to manage events</p>
        </div>

        <form method="POST" action="{{ url_for('admin_signup') }}" data-validate id="adminSignupForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" name="name" id="name" class="form-control"
                       placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" class="form-control"
                       placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="admin_code">Admin Registration Code</label>
                <input type="text" name="admin_code" id="admin_code" class="form-control"
                       placeholder="Enter admin code" required>
                <p class="form-hint">Contact the system administrator for the registration code</p>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control"
                       placeholder="At least 6 characters" required minlength="6">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" name="confirm_password" id="confirm_password" class="form-control"
                       placeholder="Re-enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="adminSignupBtn">
                Create Admin Account
            </button>
        </form>

        <div class="form-links">
            <p>Already have an admin account? <a href="{{ url_for('admin_login') }}">Admin Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
