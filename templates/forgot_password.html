{% extends 'base.html' %}
{% block title %}Forgot Password – EventHub{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card-header">
            <div class="auth-icon" style="background: linear-gradient(135deg, #f59e0b, #ef4444);">🔒</div>
            <h2>Forgot Password?</h2>
            <p>Enter your email and we'll send you a reset link</p>
        </div>

        <form method="POST" action="{{ url_for('forgot_password') }}" data-validate id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" class="form-control"
                       placeholder="Enter your registered email" required>
                <p class="form-hint">We'll send a password reset link to this email</p>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="resetBtn">
                📧 Send Reset Link
            </button>
        </form>

        <div class="form-links mt-3">
            <p>Remember your password? <a href="{{ url_for('login') }}">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}
